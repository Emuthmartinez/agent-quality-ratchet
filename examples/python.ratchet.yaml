language: python

metrics:
  lint_violations:
    tool: ruff
    direction: down
  test_count:
    tool: pytest
    direction: up
  coverage:
    tool: pytest-cov
    direction: up
  complexity:
    tool: ruff-c90
    threshold: 15
    direction: down

priorities:
  growth: 3.0
  reliability: 2.0
  cost: 1.5
  retention: 2.0
  default: 1.0

impact_keywords:
  growth: [onboarding, funnel, activation, signup, registration]
  reliability: [chat, recommendation, generation, streaming]
  cost: [model, embedding, openai, anthropic, ai_service]
  retention: [notification, engagement, daily, weekly]
